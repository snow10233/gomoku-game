name: Gomoku CI (Ubuntu)

# 1. 什麼時候要喚醒機器人？
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# 2. 機器人要做的工作流程 (Jobs)
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 步驟 1：下載專案程式碼
      uses: actions/checkout@v3

    - name: ⚙️ 步驟 2：執行 CMake 設定
      # 告訴機器人：請在 backend 資料夾裡面執行這行指令
      working-directory: ./backend
      run: cmake -B build

    - name: 🔨 步驟 3：開始編譯！
      # 這裡也一樣，確保它在 backend 裡面找 build 資料夾
      working-directory: ./backend
      run: cmake --build build
